name: Release

# Build, sign, and publish a Cairn release whenever a v* tag is pushed.
#
# REQUIRED SECRETS (set under Settings → Secrets and variables → Actions
# before pushing your first v* tag — the workflow fails fast otherwise):
#   TAURI_UPDATER_PRIVATE_KEY           — base64 minisign private key
#                                         (matches the pubkey embedded in
#                                          src-tauri/tauri.conf.json)
#   TAURI_UPDATER_PRIVATE_KEY_PASSWORD  — only if the key has a password
#                                         (the current key has none — leave unset)
#
# If TAURI_UPDATER_PRIVATE_KEY is not set, the "Sign .app.tar.gz" step
# fails and no release is published. That's intentional — an unsigned
# update wouldn't verify against the public key shipped in the app, and
# the updater plugin would refuse to install it.
#
# WHY .app.tar.gz (gzip+tar), NOT .app.zip:
#   - The Tauri 2 macOS updater can ONLY extract gzip+tar. Verified
#     against the crate source tauri-plugin-updater 2.10.1,
#     src/updater.rs `Update::install_inner` (macOS, ~L1217-1233): it
#     unconditionally does `GzDecoder::new(cursor)` then
#     `tar::Archive::new(decoder)` with NO archive-type detection. A
#     `.app.zip` (PK magic bytes) handed to GzDecoder fails at
#     `archive.entries()` — AFTER the signature verifies (minisign signs
#     the raw bytes, so a signed .zip passes the signature check, then
#     throws at extraction). Contrast the Windows path (~L882-888) which
#     DOES branch on `infer::archive::is_zip`; that zip support is
#     Windows-only.
#   - The updater strips the first path component of each tar entry
#     (`entry.path()?.iter().skip(1)`, ~L1238), so the archive's
#     top-level entry must be `Cairn.app/` — i.e. tar from inside the
#     bundle dir (done below), exactly as the old `zip -r` did.
#
# WHY EXPLICIT STEPS (NOT tauri-apps/tauri-action):
#   - tauri-action would also emit `.app.tar.gz`, but the manual
#     maintainer flow in docs/RELEASING.md needs to produce a
#     byte-compatible artifact from a laptop hotfix. Spelling out the
#     `tar czf` + sign + latest.json steps keeps CI and the documented
#     manual flow in lockstep on the SAME format and URL convention.
#
# WHY MACOS-14 RUNNER:
#   - macos-14 is GitHub's Apple Silicon (M1) runner. We build a UNIVERSAL
#     binary (--target universal-apple-darwin): the runner compiles the
#     aarch64 slice natively and cross-compiles the x86_64 slice, then lipo
#     fuses them so one .app.tar.gz runs on both Apple Silicon and Intel.

on:
  push:
    tags:
      - 'v*'

# Make cargo resilient to transient crates.io network blips on the runner
# (a "Connection reset by peer" while downloading a crate failed a release
# build once). Retries the fetch instead of failing the whole release.
env:
  CARGO_NET_RETRY: "10"
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  # Test GATE — nothing builds or publishes unless the full suite passes.
  # A tag pushed from a red branch would otherwise ship straight to
  # auto-updating users. Runs on macos-14 (same runner family as the
  # build job) so this is also the project's only macOS test signal —
  # test.yml runs the JS suite on Linux and only `cargo check`s Rust.
  test-gate:
    name: Test gate (full suite + tsc + cargo test)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install npm deps
        run: npm ci

      - name: Run unit suite
        # --run = single non-watch pass. No --bail so one flake doesn't
        # mask other regressions before a release.
        run: npm test -- --run

      - name: Type check
        run: npx tsc --noEmit

      - name: cargo test (src-tauri)
        working-directory: src-tauri
        # Passes even with zero Rust tests; wiring it now is safe and
        # gates the first Rust tests as they land.
        run: cargo test

  build-macos-arm64:
    needs: test-gate  # do not build/sign/publish unless the gate is green
    runs-on: macos-14  # Apple Silicon — builds a universal (arm64+x86_64) binary
    permissions:
      contents: write  # create release + upload assets

    env:
      # Both env vars are read by `npx tauri signer sign` directly.
      # The Tauri build step does NOT auto-sign because bundle.targets
      # is ["app"] (no updater artifact emitted automatically) — we tar
      # the .app into .app.tar.gz and sign it in a later step.
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Match test.yml. Node 20 LTS = maintainer's local version.
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          # Universal build — runner is aarch64-apple-darwin and builds
          # both slices; x86_64-apple-darwin is cross-compiled, then `lipo`
          # (via --target universal-apple-darwin) fuses them into one binary.
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Fail fast if updater key is missing
        # Without the secret, the sign step would fail mid-build and the
        # release would be half-uploaded. Better to fail at step 1 with
        # a clear message than to leave a partial release artifact.
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
            echo "ERROR: TAURI_UPDATER_PRIVATE_KEY secret is not set."
            echo "Add it under Settings → Secrets and variables → Actions"
            echo "before tagging a release. See docs/RELEASING.md."
            exit 1
          fi

      - name: Install npm deps
        run: npm ci

      - name: Extract version from tag
        # v0.1.0 → 0.1.0. Used for the artifact filename and latest.json.
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag version matches package.json
        # Catches the easy mistake of tagging v0.1.1 without bumping
        # package.json / Cargo.toml / tauri.conf.json. The three sources
        # of truth for the version must agree or the updater URL points
        # to a file that doesn't exist.
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.ver.outputs.version }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: tag v${TAG_VERSION} doesn't match package.json version ${PKG_VERSION}"
            echo "Bump package.json + src-tauri/Cargo.toml + src-tauri/tauri.conf.json first."
            exit 1
          fi

      - name: Build .app bundle
        # bundle.targets = ["app"] in tauri.conf.json, so this emits only
        # Cairn.app (no .dmg attempt — `bundle_dmg.sh` fails on macOS 26).
        # --target universal-apple-darwin builds BOTH arch slices and lipo-
        # fuses them, so the output lands under
        # target/universal-apple-darwin/release/bundle/macos/ (not the plain
        # target/release/...). Wall time on the macos-14 runner: ~15-30 min
        # cold (two arch slices, no cargo cache).
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Tar+gzip the .app bundle (updater artifact)
        # The macOS updater requires gzip+tar (see WHY header). Working
        # directly in the bundle dir so the tar's top-level entry is
        # `Cairn.app/` (not `release/bundle/macos/Cairn.app/`) — the
        # updater strips the first path component, so the entry name must
        # start with `Cairn.app/`. Mirrors `docs/RELEASING.md` step 3.
        run: |
          cd src-tauri/target/universal-apple-darwin/release/bundle/macos
          tar czf "Cairn_${{ steps.ver.outputs.version }}_universal.app.tar.gz" Cairn.app

      - name: Sign .app.tar.gz with the updater private key
        # Reads TAURI_SIGNING_PRIVATE_KEY from the job env (set above).
        # Produces `<file>.sig` next to the .app.tar.gz.
        run: |
          npx tauri signer sign \
            "src-tauri/target/universal-apple-darwin/release/bundle/macos/Cairn_${{ steps.ver.outputs.version }}_universal.app.tar.gz"

      - name: Write latest.json (Tauri 2 updater manifest)
        # Schema: https://v2.tauri.app/plugin/updater/#static-json-file
        # We ship ONE universal .app.tar.gz that runs on both arches, so the
        # manifest lists both darwin-aarch64 and darwin-x86_64 pointing at
        # the SAME url with the SAME signature (minisign signs that one file;
        # the same bytes satisfy both arches). Tauri's updater keys lookups
        # by `darwin-<arch>`, so the x86_64 entry is required for Intel
        # installs to see the update at all.
        run: |
          APP_TARBALL="src-tauri/target/universal-apple-darwin/release/bundle/macos/Cairn_${{ steps.ver.outputs.version }}_universal.app.tar.gz"
          SIG=$(cat "${APP_TARBALL}.sig")
          # Use the CHANGELOG section for this version as the updater
          # release notes (shown in Settings → Updates), falling back to
          # a one-liner if the section isn't present. `jq -Rs` slurps the
          # raw text and JSON-encodes it (escapes quotes/newlines) so the
          # manifest stays valid JSON.
          #
          # awk: start printing at this version's `## [x.y.z]` header;
          # stop at the next `## [` header OR at the first link-reference
          # footer line (`[x.y.z]: https://...`). The footer guard matters
          # for the BOTTOM-most entry, which has no following `## [` and
          # would otherwise slurp the trailing link refs to EOF. The END
          # block trims trailing blank lines so the notes end cleanly.
          NOTES=$(awk -v ver="${{ steps.ver.outputs.version }}" '
            $0 ~ "^## \\[" ver "\\]" {p=1}
            p && /^## \[/ && $0 !~ "^## \\[" ver "\\]" {exit}
            p && /^\[[^]]+\]:[[:space:]]/ {exit}
            p {buf[n++]=$0}
            END {while (n>0 && buf[n-1]=="") n--; for (i=0;i<n;i++) print buf[i]}
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${{ github.ref_name }}. See the GitHub Release page for the changelog."
          fi
          NOTES_JSON=$(printf '%s' "$NOTES" | jq -Rs .)
          cat > latest.json <<EOF
          {
            "version": "${{ steps.ver.outputs.version }}",
            "notes": ${NOTES_JSON},
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIG}",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Cairn_${{ steps.ver.outputs.version }}_universal.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${SIG}",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Cairn_${{ steps.ver.outputs.version }}_universal.app.tar.gz"
              }
            }
          }
          EOF

      - name: Publish GitHub Release
        # softprops/action-gh-release is the de-facto standard for "create
        # release + attach files." It creates the release if the tag
        # doesn't already have one, otherwise it appends assets.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Cairn ${{ steps.ver.outputs.version }}
          # Release body = the full CHANGELOG so the Releases page shows
          # real content (not a placeholder). The updater's own notes
          # (Settings → Updates) come from latest.json above, which uses
          # just this version's CHANGELOG section.
          body_path: CHANGELOG.md
          # Drafts default to off so the moment this step succeeds, the
          # in-app updater's poll URL starts returning the new version.
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/macos/Cairn_${{ steps.ver.outputs.version }}_universal.app.tar.gz
            src-tauri/target/universal-apple-darwin/release/bundle/macos/Cairn_${{ steps.ver.outputs.version }}_universal.app.tar.gz.sig
            latest.json

  build-windows:
    name: Build Windows x64 (NSIS, unsigned)
    # Serialized AFTER the Mac job, not parallel with it: build-macos-arm64
    # creates the GitHub Release (name + CHANGELOG body), and this job only
    # APPENDS the .exe to it. Running both concurrently would race
    # action-gh-release's check-then-create flow into an `already_exists`
    # failure. test-gate is implied transitively via build-macos-arm64 but
    # listed explicitly so the gate intent survives a future refactor.
    needs: [test-gate, build-macos-arm64]
    runs-on: windows-latest  # host is x86_64-pc-windows-msvc — the target triple
    timeout-minutes: 60  # cold cargo build + NSIS tooling download runs long on Windows runners
    permissions:
      contents: write  # append the installer asset to the existing release

    # NOTE: deliberately NO TAURI_SIGNING_* env and no updater-secret
    # fail-fast here. Windows ships no updater artifact in this phase
    # (latest.json has no windows-x86_64 key), so nothing in this job
    # reads the minisign key. The installer itself is unsigned —
    # SmartScreen "More info → Run anyway" is the documented posture.
    #
    # Every `run:` step below sets `shell: bash` explicitly. The Windows
    # runner defaults to PowerShell, which breaks `${GITHUB_REF_NAME#v}`,
    # `>> "$GITHUB_OUTPUT"`, and `[ ... ]`. Git Bash ships on windows-latest.

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Match test-gate / build-macos-arm64. CI was just deliberately
          # fixed to be green on Node 20 — bump all three jobs together
          # or not at all.
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        # No `targets:` — unlike the Mac jobs (which pin aarch64), the
        # host triple x86_64-pc-windows-msvc IS the build target.

      - name: Install npm deps
        shell: bash
        # --ignore-scripts skips native postinstall compiles (notably
        # better-sqlite3, a TEST-ONLY dep). On windows-latest, node 20's
        # node-gyp can't recognize the runner's "Visual Studio 18" and the
        # build fails. The Windows job only runs `tauri build` (vite + cargo),
        # never the JS test suite, so better-sqlite3's native binary is never
        # needed here. vite/esbuild/rollup ship prebuilt platform binaries via
        # optionalDependencies (packages, not postinstall scripts), so the
        # frontend build is unaffected.
        run: npm ci --ignore-scripts

      - name: Extract version from tag
        # v0.1.0 → 0.1.0. Mirrors the Mac job's step; consumed by the
        # tag-vs-package.json check below.
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag version matches package.json
        # Same three-sources-of-truth check as the Mac job, repeated here
        # so a Windows-only re-run still refuses a mismatched tag.
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.ver.outputs.version }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: tag v${TAG_VERSION} doesn't match package.json version ${PKG_VERSION}"
            echo "Bump package.json + src-tauri/Cargo.toml + src-tauri/tauri.conf.json first."
            exit 1
          fi

      - name: Build NSIS installer
        # `--bundles nsis` REPLACES the configured bundle.targets (["app"])
        # for this invocation only, so the Mac job's plain `npm run tauri
        # build` is byte-identical to before this job existed. Emits
        # src-tauri/target/release/bundle/nsis/*_x64-setup.exe (no
        # `--target` flag → plain target/release/). The Tauri CLI
        # auto-downloads the NSIS toolchain on first use.
        shell: bash
        run: npm run tauri build -- --bundles nsis

      - name: Bundle hygiene gate
        # Assert no local data files leaked into anything we might upload.
        # bash find, not Windows' native find.exe (which is a different tool).
        shell: bash
        run: |
          hits=$(find src-tauri/target/release/bundle -type f \( -name '*.db' -o -name '*.sqlite' -o -name '*.csv' -o -name '.env' \) -print)
          [ -z "$hits" ] || { echo "Forbidden files in bundle:"; echo "$hits"; exit 1; }

      - name: Append Windows installer to the GitHub Release
        # The release already exists (created by build-macos-arm64 with
        # name + CHANGELOG body). Omitting `name:`/`body_path:` here is
        # load-bearing: action-gh-release then leaves the existing release
        # info untouched and only uploads the new asset. The suffix glob
        # (not a hardcoded Cairn_ prefix) tolerates either binary-name
        # outcome of the mainBinaryName config.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/release/bundle/nsis/*_x64-setup.exe
