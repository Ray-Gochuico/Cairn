<?xml version="1.0" encoding="UTF-8"?>
<!--
  Option 3 — "Trail Marker"
  A cairn on a path with a horizon. Storytelling icon — the curve of the
  path under the cairn signals "you are en route somewhere", which is the
  app's narrative (roadmap to financial independence). Slightly more
  decorative than Options 1/2; will not collapse well below ~48px.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1024 1024"
  width="1024"
  height="1024"
  role="img"
  aria-label="Cairn — trail marker on a winding path"
>
  <!-- Plate. -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="#E8DCC2"/>

  <!-- Sky band (subtle gradient) implied by a slightly lighter top half. -->
  <rect x="0" y="0" width="1024" height="540" fill="#F2E9D4"/>

  <!-- Horizon line. -->
  <line x1="0" y1="540" x2="1024" y2="540" stroke="#B59E70" stroke-width="3" stroke-dasharray="0"/>

  <!-- Path — a tapering S-curve from bottom-right to the cairn. -->
  <path
    d="M 1024 920
       C 800 880, 700 820, 612 740
       C 540 680, 500 600, 512 540
       L 512 540
       C 524 600, 484 680, 412 740
       C 324 820, 224 880, 0 920
       Z"
    fill="#C7A86F" opacity="0.55"/>

  <!-- Path inner edge — a darker stroke gives the path a "worn" feel. -->
  <path
    d="M 1024 920
       C 800 880, 700 820, 612 740
       C 540 680, 500 600, 512 540"
    fill="none" stroke="#8C7242" stroke-width="6"/>
  <path
    d="M 0 920
       C 224 880, 324 820, 412 740
       C 484 680, 524 600, 512 540"
    fill="none" stroke="#8C7242" stroke-width="6"/>

  <!-- Cairn — perched at the horizon. 4 stones. -->
  <g stroke="#2A2218" stroke-width="6" stroke-linejoin="round">
    <!-- base -->
    <ellipse cx="512" cy="538" rx="98" ry="22" fill="#5C5346"/>
    <!-- second -->
    <ellipse cx="512" cy="498" rx="82" ry="20" fill="#7A6A52"/>
    <!-- third -->
    <ellipse cx="512" cy="462" rx="64" ry="18" fill="#9A8260"/>
    <!-- top -->
    <ellipse cx="512" cy="430" rx="42" ry="14" fill="#B89A6E"/>
  </g>
</svg>
